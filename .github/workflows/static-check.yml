name: Static Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:visual
      - run: npm run test:file
      - run: npm audit --audit-level=moderate
