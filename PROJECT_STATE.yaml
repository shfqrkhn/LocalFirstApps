  decisions:
    - id: D-001
      state: ACCEPTED
      decision: The prime MPES is amended by explicit owner direction to merge LedgerSuite into CommonGround while retaining compatibility and all MPES safety invariants.
    - id: D-002
      state: ACCEPTED
      decision: Keep LedgerSuite as an archive-excluded compatibility redirect for v0.2.0 and keep legacy import support indefinitely.
    - id: D-003
      state: ACCEPTED
      decision: Preserve focused app isolation; do not interpret conceptual LifeOS and WorkOS groupings as permission for a repository-wide monolith.
