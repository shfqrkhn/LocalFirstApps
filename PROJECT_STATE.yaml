  decisions:
    - id: D-001
      state: ACCEPTED
      decision: The prime MPES is amended by explicit owner direction to merge LedgerSuite into CommonGround while retaining compatibility and all MPES safety invariants.
    - id: D-002
      state: ACCEPTED
      decision: Keep LedgerSuite as an archive-excluded compatibility redirect for v0.2.0 and keep legacy import support indefinitely.
    - id: D-003
      state: ACCEPTED
      decision: Preserve focused app isolation; do not interpret conceptual LifeOS and WorkOS groupings as permission for a repository-wide monolith.
    - id: D-005
      state: ACCEPTED
      decision: Shared integration is a dependency-free semver file contract with app-owned adapters, explicit preview and atomic receipt-backed mutation; it creates no shared runtime storage or synchronization.
    - id: D-006
      state: ACCEPTED
      decision: Reusable PWA assurance is a dependency-free app-owned shell contract with content-addressed complete staging, explicit compatible activation, one retained last-known-good shell, scoped health and reset, and no shared data runtime.
    - id: D-007
      state: ACCEPTED
      decision: M3A adds an independent HealthOS Focus app and narrow portable schema; Noodle Nudge and Flexx Files remain canonical isolated modules, later HealthOS modules remain inactive, and the LedgerSuite compatibility URL remains preserved pending explicit deprecation authority.
    - id: D-008
      state: ACCEPTED
      decision: Explicit document authority makes the MPES prime product authority beneath external constraints and later owner instructions; source content and archives are non-authoritative.
    - id: D-009
      state: ACCEPTED
      decision: Converge primary user surfaces into CommonGround LifeOS and WorkOS while preserving isolated data, explicit transfer, compatibility routes, and reversible migration.
    - id: D-010
      state: ACCEPTED
      decision: Archive only proven-inactive material with export exclusion, provenance, and restoration instructions; never archive required compatibility or recovery paths.
    - id: D-011
      state: ACCEPTED
      decision: R0 contains shared-origin cache and executable-scoring risks without migrating data; Noodle adopts the app-owned PWA assurance contract and inert scoring grammar while PMQuiz retains its existing worker behind strict cache ownership.
    - id: D-012
      state: ACCEPTED
      decision: R1 freezes unrecoverable TS-Dash generated artifacts and requires a behavior-first readable rewrite; design, governance, build, release, and provenance foundations remain narrow contracts and do not authorize app migration.
    - id: D-013
      state: ACCEPTED
      decision: OmniCore 1.0.0 promotes only proven pure contracts with CommonGround and HealthOS adapters; mutation scope and domain logic remain app-owned, and old HealthOS shared URLs remain compatibility re-exports.
    - id: D-014
      state: ACCEPTED
      decision: CommonGround LifeOS is seeded by HealthOS Focus without absorbing app runtimes; Reflection stays Noodle-owned and adapter-only, Strength stays linked to Flexx, and preference restore is failure-visible and resumable.
    - id: D-015
      state: ACCEPTED
      decision: Strength domain logic remains Flexx-owned behind a versioned app adapter; LifeOS receives metadata and exact non-mutating previews only, while Flexx v3 storage, recovery, route, worker, cache, UI behavior, and compatibility identities remain authoritative.
    - id: D-016
      state: ACCEPTED
      decision: Flexx UI orchestration is split into app-owned state, command, timer, modal, view, and binding modules; the 20 window names remain only as an explicit compatibility facade, cross-tab session changes invalidate local cache without interrupting an active workout, and completed sessions cannot be reintroduced as drafts.
    - id: D-017
      state: ACCEPTED
      decision: Noodle UI orchestration is split into eight app-owned controller modules behind nine evidenced compatibility bindings; assessment completion atomically merges with the latest app record, lifecycle refresh preserves active forms, imports and reset fail visibly without partial or foreign mutation, and inline script/handlers are removed without changing v1 data or 42 scoring outputs.
