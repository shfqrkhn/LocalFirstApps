    - id: R-012
      status: controlled_with_limitations
      risk: ungoverned_exam_psychometric_and_health_content_claims
      control: 3868 item-level records and 41 duplicate groups are machine-inventoried and quarantined; unsupported user-facing claims are softened; qualified source/license/domain review remains required before approval or consolidated release
    - id: R-013
      status: controlled
      risk: omnicore_abstraction_creep_or_shared_runtime_coupling
      control: machine-readable exclusions, two-consumer gate, app-owned adapters/databases/workers/transactions, compatibility tests, and code-only rollback
    - id: R-014
      status: controlled
      risk: cross_storage_restore_can_commit_records_before_preferences
      control: durable pending-preference marker in the canonical IndexedDB transaction, one normalized preference write, explicit incomplete status, idempotent retry, and injected-failure browser proof
    - id: R-015
      status: controlled
      risk: flexx_global_controller_and_html_rendering_coupling
      control: R3C replaces the monolith with six versioned app-owned controller modules, a 209-line composition root, safe numeric/chart and sanitized-content rendering, exact compatibility bindings, and deterministic/browser parity gates
    - id: R-016
      status: controlled
      risk: noodle_reflection_ui_controller_coupling
      control: R3D replaces the HTML monolith with eight app-owned controller modules, a 119-line composition root, safe DOM/chart construction, nine explicit compatibility bindings, atomic assessment persistence, scoped recovery, and complete deterministic/browser parity gates
    - id: R-017
      status: open
      risk: lifeos_visual_language_fragmentation
      control: preserve app identity/data/runtime boundaries while routing the next bounded packet through token-by-token responsive, interaction, contrast, focus, reduced-motion, file, offline, and screenshot parity gates across HealthOS, Noodle, and Flexx
